name: PR checks with taskfile
on:
  pull_request:

jobs:
  start:
    name: "Start Project"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.40.0

      - name: Start server
        run: |
          stdbuf -oL -eL task start > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for server to start
        run: |
          export PORT=$(grep '^\s*PORT:' taskfile.yaml | awk '{print $2}')
          timeout 120 bash -c 'curl --head --fail --retry-delay 1 --retry 30 --retry-connrefused http://localhost:${PORT}'

      - name: Print server logs
        if: always()
        run: |
          cat server.log || true

      - name: Check server is returning 200
        run: |
          export PORT=$(grep '^\s*PORT:' taskfile.yaml | awk '{print $2}')
          curl --head --fail --retry-delay 1 --retry 30 --retry-connrefused http://localhost:${PORT}

      - name: Stop server
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

  build:
    name: "Build Project"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.40.0

      - name: Build project
        run: task build

  test:
    name: "Test Project"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.40.0

      - name: Test project
        run: task test

  lint:
    name: "Lint Project"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.40.0

      - name: Lint project
        run: task lint

  install:
    name: "Install Project"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.40.0

      - name: Install dependencies
        run: task install

  format:
    name: "Format Project"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Taskfile
        uses: arduino/setup-task@v2
        with:
          version: 3.40.0

      - name: Format project
        run: task format
